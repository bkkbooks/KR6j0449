  - {type: variant, offset: 2373, length: 113, content: '「又法若花若菓誦真言七遍加持，以將與人，則得歡喜。

      「此金剛童子真言對舍利塔前念誦，餘處不應念誦，作法不成。若常念誦不間斷者，一切所求皆得成就。應發菩提心，離慳悋想，〔常習捨施〕－【丁】常習捨施【大】，〔－〕【丁】常習捨施，遠離無益世間談話，一切勝願皆得現前，不被諸魔之所得便。亦不應與人治病，及治鬼魅，以妨大法。」', 丙: ''}
