  - {type: punctuation, offset: 5700, content: 「, id: KR6j0449_T_001-bkkpn1116}
  - {type: variant, offset: 5700, length: 1265, content: '「又法欲禁止他敵令彼昏迷，所執器仗不能為＋（害）【甲】【乙】為【大】，為害【甲】【乙】為為害者，三日不食，應畫四印漫荼羅，或依《吉祥器經》中壇畫法隨力供養。於壇中一髻尊菩薩位處，置竹竿青幡，上取自嚕地羅和毒及白芥子，畫作三股底里商俱金剛杵，杵心畫聖忿怒金剛童子形。於竹竿下地上，以劫波羅末和泥，揑作獨股金剛杵形。作護摩爐，爐中又揑泥作一小獨股金剛杵＋（繞爐亦畫獨股金剛杵）【甲】【乙】杵【大】，杵繞爐亦畫獨股金剛杵【甲】【乙】杵杵繞爐亦畫獨股金剛杵。取棘刺木燃火，取（人）＋骨【甲】【乙】骨【大】，人骨【甲】【乙】骨人骨末和毒，一誦真言一稱彼名擲著爐中，對於軍陣前作法，令彼軍眾兩目皆盲不見，一切手中器仗悉皆自落，若＝各【甲】【乙】若【大】，各【甲】【乙】若各於當處不動如杌。

      「又法令彼麼羅者，使明醫於自頭上五脈處刺取嚕地羅作護摩，誦真言一遍一稱彼名，一切他敵於須臾頃頑癡如杌，任從＝仕從【甲】，任自ィ【甲】任從【大】，仕從【甲】，任自【校異-甲】任從仕從任自捉縛殺害。彼若順伏，即起悲愍心作息災法，取酥和蜜，以龍花蘂搵，稱彼名誦真言一遍一擲火中，彼苦皆息。

      「又法欲破他陣。彼軍欲逼且縱相近，近已，如前作四印壇或畫餘壇亦得，竪前青幡，對彼軍前作護摩爐，持誦者裸體被髮結印被甲護身，取摩訶莽娑和毒嚕地囉，日三時念誦，每時一百八遍投火，准前稱彼名。作如是法已，彼等設如梵王、那羅延、摩醯首羅、俱摩羅天等威德自在，七日中間互相諍訟、相鬪殺害、互相間搆，悉皆斷命。二七日間摩＝磨【甲】【乙】摩【大】，磨【甲】【乙】摩磨滅無餘。念誦時不得語，若欲寢息應臥牛皮。

      「又法設不具如前儀軌，對軍陣前念誦，或如常護摩，隨其意樂。依餘部中易得之物作法，彼軍自當退敗。金剛手菩薩作如是說。彼若歸伏，如前作息災法。

      「又法欲驗伏藏，取黃牛酥、蛇皮、蛟＝蛇【甲】，鮫ヵ【甲】蛟【大】，蛇【甲】，鮫【考偽-甲】蛟鮫蛇魚脂，斷遏伽木取綿，以此等作燈炷，誦真言加持。夜然炷近伏藏處照，隨焰大小即知伏藏大小。若辟除護伏藏神及作障者，取疆石或土塊或芥子或水加持擲於伏藏，藏上障者退散，設有大龍亦皆退散。

      「又法驅逐惡人令遠去者，取朗伽離藥，誦真言稱彼名加持七遍，埋彼人門閫下，即自遠逝。

      「又法以白檀香三指許，剋＝刻ヵ【甲】剋【大】，刻【考偽-甲】剋刻作金剛童子像，右手把獨股金剛杵、左手施願手，忿怒形，咬下脣，用金剛杵形以為瓔珞莊嚴。以毘梨勒木作合盛之，燒蘇合白檀香供養。對合前念誦三＋（十）【甲】【乙】【丁】三【大】，三十【甲】【乙】【丁】三三十萬遍，即成就一千種大事。不擇時日宿直、不限齋戒，不成就人亦得成就。若人有厄難，稱彼人名念誦則得解脫。

      「又法食采或飲乳或乞食，〔念〕－【甲】【乙】念【大】，〔－〕【甲】【乙】念應持禁戒一如比丘，誦真言三十萬遍，所為所作對此像前如前縛撲所問，皆得應驗。

      「〔又法…命終〕十七行－【丁】〔又法…命終〕十七行二百六十一字－【丁】又法欲得敬愛者，畫四肘像，不應用皮膠。於像中心畫佛在菩提樹下結跏趺坐，作說法相，比丘眾圍遶。於下右邊畫金剛忿怒菩薩，狗牙上出，口咬下脣，身如青蓮花色，眼赤黃色，眉顰蹙，以種種寶莊嚴身，當額流出長六指金剛童子，（身）＋形【甲】【乙】形【大】，身形【甲】【乙】形身形充滿，口有四牙，遍身千光流出，顰眉，以右手頭指作期剋勢。

      「左邊畫持誦者，右膝著地，手執香爐。金剛手菩薩言，我今說所求事。取午＝牛【乙】午【大】，牛【乙】午牛膝搵酥投火中護摩，日三時，每時一百八遍，一遍一稱彼名。滿七日，一切有情皆得歡喜。以此儀軌，若油麻投火中護摩，皆得敬愛。

      「又法至於塚間作彼設咄＝吐【甲】＊咄【大】＊，吐【甲】＊咄吐嚕形，屍林中取死人骨作橛，以赤線纏之，釘彼設咄吐嚕形心上，彼即母馱。

      「又法取芥子和毒嚕地囉，日三時，每時誦一百八遍，稱彼名。滿七日已，彼即命終。

      「又雄黃法者，如前畫像法，取雄黃置於熱銅器中。持誦者取五淨飲之，身即清淨。置像於舍利塔前，用根本真言淨其精舍、〔護身〕－【甲】【乙】護身【大】，〔－〕【甲】【乙】護身、結方隅界。（護身）＋用【甲】【乙】用【大】，護身用【甲】【乙】用護身用前眷屬真言，加持塗香、燒香、時花、飲食、燈燭＝燭燈【甲】【乙】燈燭【大】，燭燈【甲】【乙】燈燭燭燈以申供養。或黑月八日或黑月十四日，用四箇菩提葉承雄黃器，用三箇菩提葉覆之。無菩提葉，夜合葉亦得。念誦乃至三相現，所謂煖、煙、光。若煖相見＝現【甲】【乙】【丁】＊見【大】＊，現【甲】【乙】【丁】＊見現，取塗足，即離地一𮚺＝磔【甲】，柝【乙】，尺【丁】𮚺【大】，磔【甲】，柝【乙】，尺【丁】𮚺磔柝尺，日行千里。若煙相見現，則得安怛但那。若光相見現，則飛騰虛空，一切無能沮壞。若於路中，所逢象馬車乘自開路避之。行者作法時，應著黃衣，及以黃神線角落如披袈娑＝絡如被袈裟【甲】【丁】落如披袈娑【大】，絡如被袈裟【甲】【丁】落，如披袈娑＝裟【乙】裟【CB】【乙】，娑【大】裟T21n1222bp0123a15娑裟絡如被袈裟。若求安膳那成就，以青埿染衣服著，或服赤衣，神線亦如是。金剛手菩薩作如是說。', 丙: ''}
