  - {type: variant, offset: 6471, length: 261, content: '又法欲得敬愛者，畫四肘像，不應用皮膠。於像中心畫佛在菩提樹下結跏趺坐，作說法相，比丘眾圍遶。於下右邊畫金剛忿怒菩薩，狗牙上出，口咬下脣，身如青蓮花色，眼赤黃色，眉顰蹙，以種種寶莊嚴身，當額流出長六指金剛童子，（身）＋形【甲】【乙】形【大】，身形【甲】【乙】形身形充滿，口有四牙，遍身千光流出，顰眉，以右手頭指作期剋勢。

      「左邊畫持誦者，右膝著地，手執香爐。金剛手菩薩言，我今說所求事。取午＝牛【乙】午【大】，牛【乙】午牛膝搵酥投火中護摩，日三時，每時一百八遍，一遍一稱彼名。滿七日，一切有情皆得歡喜。以此儀軌，若油麻投火中護摩，皆得敬愛。

      「又法至於塚間作彼設咄＝吐【甲】＊咄【大】＊，吐【甲】＊咄吐嚕形，屍林中取死人骨作橛，以赤線纏之，釘彼設咄吐嚕形心上，彼即母馱。

      「又法取芥子和毒嚕地囉，日三時，每時誦一百八遍，稱彼名。滿七日已，彼即命終。', 丁: ''}
