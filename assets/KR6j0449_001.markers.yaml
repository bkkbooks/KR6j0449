  - {type: variant, offset: 4669, length: 156, content: 真言九十萬遍，作先行法。正誦持時，有惡人來作障難者，以忿怒誦真言而相顧視，彼即瘨＝癲【甲】【乙】【丁】＊瘨【大】＊，癲【甲】【乙】【丁】＊瘨癲癎狂亂。若稱彼名念誦視之，其人身肉片片圮裂，或時致死世醫不救。須臾以右脚大指極按其地誦真言，即空中雨火熾然燒之。若起慈心念誦，如水滅火，即得惺＝醒【甲】【乙】惺【大】，醒【甲】【乙】惺醒悟。若外賊侵境，稱彼魁帥＝師【甲】【丁】帥【大】，師【甲】【丁】帥師名念誦者，彼之軍眾盡皆疫病，或彼迸逃竄、或當枯死、或迷睡不覺、或瘨癲癎瘧病、或遍身痛惱。彼若順伏，慈心念誦，還得如故, 丙: ''}
