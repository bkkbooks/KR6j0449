  - {type: punctuation, offset: 5121, content: 「, id: KR6j0449_T_001-bkkpn1037}
  - {type: variant, offset: 5121, length: 227, content: 又法若隣國侵境、惡臣作亂者，對此像前取人劫波羅擣為末，揑作彼人形，當於塚＋（墓）【甲】【乙】塚【大】，塚墓【甲】【乙】塚塚墓間或於池側，以像面向北，持誦者面向南坐，於三角壇中安置像，持誦者斷語乞食，忿怒作無悲愍心，以右手作金剛拳，舒小指刺彼人形心上，誦真言無間斷。由此威力，即令彼人得大寒熱病。行者應時即於壇中，忿怒王當〔即〕－【甲】【乙】即【大】，〔－〕【甲】【乙】即現身如大拇＝母【甲】【乙】拇【大】，母【甲】【乙】拇母指節，如火聚融金色，周圓流出金剛火焰，以右手頭指作期剋勢，即迅速至於彼處告言：『某甲＝乙【乙】甲【大】，乙【乙】甲乙持誦者使我來令斷汝命。汝今命不存。』彼聞是語，即吐熱嚕地羅，䆿＝藝【甲】，囈【乙】䆿【大】，藝【甲】，囈【乙】䆿藝囈語今＝即【甲】【乙】今【大】，即【甲】【乙】今即命盡。若歸順悔過，持誦者起慈心，速以加持香水灑彼頭上，即離苦惱，復得蘇息。金剛手菩薩（作）＋如【甲】【乙】【丁】如【大】，作如【甲】【乙】【丁】如作如是說＋（若見餘成就人得悉地者於彼起少忿怒視彼人彼所有成就法悉皆退失）【丁】說【大】，說若見餘成就人得悉地者於彼起少忿怒視彼人彼所有成就法悉皆退失【丁】說說若見餘成就人得悉地者於彼起少忿怒視彼人彼所有成就法悉皆退失, 丙: ''}
