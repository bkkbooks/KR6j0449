  - {type: punctuation, offset: 3754, content: 「, id: KR6j0449_T_002-bkkpn574}
  - {type: variant, offset: 3754, length: 118, content: '「又法於白月十三日至十五日，三日不食念誦。然後入河中水至臍，獻花一十＝千【甲】十【大】，千【甲】十千八枚，誦真言一遍擲一花於水中，即得一副衣，價直千金錢。

      「又法月蝕時，於舍利塔前取相思＝鬼【甲】思【大】，鬼【甲】思鬼子曝乾擣為末，和酥蜜作丸，置熟銅器中。取菩提葉七枚覆蓋器如前，念誦乃至光相現，分藥供養，如前取服，即得聞持不忘日誦萬言。', 丁: ''}
