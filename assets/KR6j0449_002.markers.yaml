  - {type: variant, offset: 526, length: 177, content: '「又法對像前，取蘇摩那花搵酥蜜酪護摩。於七日中日三時，時別誦真言一千八遍，一遍一擲於火中，一切人恭敬，得為邑主。

      「又法欲得摧伏設咄嚕者，取人骨以為橛，作彼人形或畫或揑，加持一百八遍，釘於心上，即得摧伏。

      「又法欲摧彼設咄嚕令麼囉者，取燒屍殘木作橛，磨紫檀香以塗橛上，取屍林中帛纏橛，釘彼設咄嚕如前形頭上，彼設咄嚕即母馱。

      「〔又法…病〕四十字－【丁】（又法…病）四十字【大】，〔－〕【丁】又法欲令設咄嚕國界疲病起者，取老烏＝鳥【甲】烏【大】，鳥【甲】烏鳥

      翅搵嚕地囉，於三角爐中誦真言七千遍。滿七日已，彼盡疫病', 丙: ''}
