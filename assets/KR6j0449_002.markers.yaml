  - {type: punctuation, offset: 3327, content: 「, id: KR6j0449_T_002-bkkpn504}
  - {type: variant, offset: 3327, length: 129, content: '「又法欲得彼人敬者，取白芥子誦真言一千八遍護摩。取淨土揑作彼人形安像前，念誦真言一千八遍，一遍一稱彼名，即得敬順。

      「又法欲求寺主歡喜者，對像前燒遏迦木護摩七日，日三時，時別誦真言一千八遍，一遍一擲，即得歡喜。

      「又法欲得作寺主者，對像前取骨屢草嫰苗搵酥護摩七日，日三時，時別誦真言一千八遍，則得如願。', 丁: ''}
