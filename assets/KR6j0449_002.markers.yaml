  - {type: punctuation, offset: 7337, content: 「, id: KR6j0449_T_002-bkkpn1111}
  - {type: variant, offset: 7337, length: 117, content: '「又法取鐵末護摩，誦真言一萬遍，一遍取一撮投火中，即獲金錢一千。

      「又法取欝金香搵香油護摩，誦真言十萬遍，每一遍取少許投火中，能滿一切勝願。

      「又法取一切香護摩，誦真言十萬遍，一遍一擲火中，被隣國所奪城邑即皆却得。

      「又法取龍腦香護摩，誦真言十萬遍，一遍一擲火中，即獲＝得【甲】獲【大】，得【甲】獲得金錢一千枚。', 丁: ''}
