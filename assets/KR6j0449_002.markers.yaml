  - {type: punctuation, offset: 5407, content: 「, id: KR6j0449_T_002-bkkpn820}
  - {type: variant, offset: 5407, length: 164, content: '「又法取天門冬護摩，誦真言一千八遍已，然後取灰置於四瓶中滿盛水，一一瓶加持一千八遍。所有患鬼魅癩癎被厭禱者，先令澡浴著新淨衣，於淨處塗一圓壇，上安一床子令患者坐，取前加持水瓶，持誦者誦真言不間斷，頂上及身澆之，所有病患災難並得除差。

      「又法取＝聖【甲】取【大】，聖【甲】取聖無能勝花一千八枚護摩，誦真言一千八遍，一遍一擲火中，入軍陣鬪戰皆得大勝。

      「又法令童女合線，誦真言加持，結繫於左臂上，不被毒蟲毒藥所中。', 丁: ''}
