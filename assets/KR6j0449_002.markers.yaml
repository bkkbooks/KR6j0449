  - {type: variant, offset: 7121, length: 103, content: '「又法以吉祥木然火，對像前護摩，誦真言一千八遍，一遍一擲火中，即得伏藏或得富饒。

      「又法對像前廣設供養，取迴香花搵酥護摩，誦真言十萬遍，一遍一擲火中，即得財寶。

      「又法於舍利塔前安像，取青蓮華十萬莖護摩，誦真言十萬遍，一遍一擲火中，即得一所莊園。', 丁: ''}
