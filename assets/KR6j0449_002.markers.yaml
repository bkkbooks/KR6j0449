  - {type: punctuation, offset: 3967, content: 「, id: KR6j0449_T_002-bkkpn606}
  - {type: variant, offset: 3967, length: 170, content: '「又法婦人難產，加持油麻油二十一遍，塗臍下腰胯，即得易產，不受諸苦。

      「又法欲入軍陣鬪戰，書此真言於樺皮上或絹素上，加持一千八遍繫於右臂，所向無敵有大威德。

      「又法於根本像前一日一夜不食，於趣海河側飲乳或食大麥，於水中取開敷蓮華十萬莖，誦真言一遍擲一花於水中，即得大伏藏。

      「又法於有舍利塔前安本尊像，取佉陀羅木然火，取蓮華三萬莖，誦真言一遍一擲於火中，滿已則見本尊現前，即獻閼伽供養，所願皆滿。', 丁: ''}
