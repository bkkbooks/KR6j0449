  - {type: punctuation, offset: 6869, content: 「, id: KR6j0449_T_002-bkkpn1038}
  - {type: variant, offset: 6869, length: 132, content: '「又法燒安息香十萬丸，無間斷念誦護摩，即得錢十萬。

      「又法對像前廣設供養，右旋敷菩提葉，安劍於葉上念誦，乃至放光，即獻閼伽供養本尊，以右手執劍，得三相現，即共千人并諸眷屬同時飛騰虛空至本尊宮殿。若遊諸持明仙宮，彼皆不能沮壞，與諸眷屬壽命同得一百萬歲。

      「又法取菖蒲護摩，誦真言一千八遍，一遍一擲火中，即得財寶。', 丁: ''}
