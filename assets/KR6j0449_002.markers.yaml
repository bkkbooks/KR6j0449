  - {type: punctuation, offset: 5629, content: 「, id: KR6j0449_T_002-bkkpn852}
  - {type: variant, offset: 5629, length: 116, content: '「又法欲降伏鳩盤茶＝槃荼【甲】盤茶【大】，槃荼【甲】盤茶槃荼鬼，取冬瓜蔓藤長十指截一千八莖，搵酥護摩，誦真言一千八遍，一遍一擲火中，其鬼即皆降伏。

      「又法欲調伏餓鬼者，取油麻末護摩，誦真言一千八遍，一遍以三指撮一擲火中，即得降伏。

      「又法欲調伏毘舍遮鬼，取塚間破帛護摩，誦真言一千八遍，一遍擲一片子投火中，即得降伏。', 丁: ''}
