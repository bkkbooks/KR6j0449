  - {type: variant, offset: 1192, length: 41, content: '「又法欲得庶＝度【甲】庶【大】，度【甲】庶度人歡喜者，取有（（香花…喜））十一字＝（（香氣花加持七遍與彼即歡喜））十二字【乙】（香花…喜）十一字【大】，香氣花加持七遍與彼即歡喜【乙】香花投火中護摩，即得歡喜香氣花加持七遍與彼即歡喜。

