  - {type: variant, offset: 310, length: 71, content: 又法（欲）＋得【甲】【乙】【丙】得【大】，欲得【甲】【乙】【丙】得欲得先行成就者，應畫聖金剛童子像，或於素上或於板上畫之。其像作忿怒形，以蛇為瓔珞，腰絛臂釧，二自瞋怒。黑月八日起首，行者應飲乳或食大麥，誦真言十萬遍，即先行成就, 丁: ''}
