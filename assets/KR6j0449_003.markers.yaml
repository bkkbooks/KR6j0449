  - {type: punctuation, offset: 3114, content: 「, id: KR6j0449_T_003-bkkpn515}
  - {type: variant, offset: 3114, length: 252, content: '「又法結忿怒童子根本印，對像前念誦真言，句中加彼人名，誦一千八遍，則得百由旬外所有一切有情類皆來降伏＋（恭敬）【甲】【乙】伏【大】，伏恭敬【甲】【乙】伏伏恭敬。

      「又法穿掘取伏藏時，誦真言一千八遍，護惜伏藏諸障難者一切皆除，伏藏不變，恣意取得。

      「又法燒諸香護摩，則取七顆毘梨勒燒取灰，又取屍陀林間帛和灰，揑作彼人形，對像前坐彼形上，念誦三日，日三時，每時誦真言一千八遍，所召一切天龍八部鬼神，皆來驅使悉得成辦。

      「又法鹽和芥子護摩七夜＋（夜）【甲】【乙】夜【大】，夜夜【甲】【乙】夜夜夜別誦真言一千八遍，大怨家即＋（得）【甲】【乙】即【大】，即得【甲】【乙】即即得降伏。

      「又法取麻油＝油麻【甲】【乙】麻油【大】，油麻【甲】【乙】麻油油麻粳米和酥蜜酪護摩，誦真言一千八遍，所求皆得。

      「又法取嚼棄齒木燃火，取迦囉尾囉花〔出〕－【乙】出【大】，〔－〕【乙】出嶺南，人呼名俱那衛花＋（也）【甲】【乙】花【大】，花也【甲】【乙】花花也一千八枚搵＝醞【乙】＊搵【大】＊，醞【乙】＊搵醞酥護摩，誦真言一千八遍，一遍一擲火中，即得一切降伏。', 丁: ''}
