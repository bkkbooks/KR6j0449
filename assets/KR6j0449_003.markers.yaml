  - {type: variant, offset: 3393, length: 38, content: '「又法欲得降伏一切摩怒沙，心念誦真言即至。

      「又法被一切毒藥所中＝當也【甲】中【大】，當也【甲】中當也，加持水七遍令飲，即得除差。', 丁: ''}
