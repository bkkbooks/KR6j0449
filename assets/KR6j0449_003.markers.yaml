  - {type: punctuation, offset: 2886, content: 「, id: KR6j0449_T_003-bkkpn476}
  - {type: variant, offset: 2886, length: 110, content: '「又法對忿怒像前，取屍林中燒屍灰，揑作彼〔人〕－【甲】【乙】人【大】，〔－〕【甲】【乙】人鬼形，書彼名於彼形心上，置於忿怒像前，坐劫波羅，燒安息悉香護摩七夜，每＋（夜）【甲】【乙】每【大】，每夜【甲】【乙】每每夜誦真言一千八遍，一遍一擲火中，即召得諸類鬼神來隨意驅使。

      「又法欲驅擯惡人出界者，燒糠護摩三日，日三時，每〔時〕－【乙】時【大】，〔－〕【乙】時誦真言一千八遍，一遍一投火中，即得出界。', 丁: ''}
